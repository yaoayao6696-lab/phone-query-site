<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机号查询系统</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:450px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        input{
            width:100%;
            padding:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#1677ff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0958d9;
        }

        #result{
            margin-top:25px;
            text-align:center;
            font-size:22px;
            color:green;
            font-weight:bold;
        }

        .history-box{
            margin-top:35px;
        }

        .history-box h3{
            margin-bottom:15px;
        }

        ul{
            list-style:none;
        }

        li{
            background:#f0f2f5;
            padding:10px;
            border-radius:6px;
            margin-bottom:10px;
            word-break:break-all;
        }

        .clear-btn{
            background:#ff4d4f;
        }

        .clear-btn:hover{
            background:#d9363e;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>手机号查询系统</h1>

    <input type="text" id="phone" placeholder="请输入手机号">

    <button onclick="queryPhone()">查询</button>

    <div id="result"></div>

    <div class="history-box">

        <h3>我的查询记录</h3>

        <ul id="history"></ul>

        <button class="clear-btn" onclick="clearHistory()">清空记录</button>

    </div>

</div>

<script>

async function queryPhone(){

    const phone = document.getElementById('phone').value;

    if(!phone){
        alert('请输入手机号');
        return;
    }

    try{

        const response = await fetch('https://phone-query-site.onrender.com/query',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({phone})

        });

        const data = await response.json();

        document.getElementById('result').innerHTML = data.message;

        saveHistory(phone);

    }catch(error){

        document.getElementById('result').innerHTML = '服务器连接失败';

    }

}

function saveHistory(phone){

    let history = JSON.parse(localStorage.getItem('history')) || [];

    history.unshift({

        phone:phone,

        time:new Date().toLocaleString()

    });

    localStorage.setItem('history',JSON.stringify(history));

    showHistory();

}

function showHistory(){

    let history = JSON.parse(localStorage.getItem('history')) || [];

    let html = '';

    history.forEach(item=>{

        html += `
            <li>
                <strong>${item.phone}</strong><br>
                <small>${item.time}</small>
            </li>
        `;

    });

    document.getElementById('history').innerHTML = html;

}

function clearHistory(){

    localStorage.removeItem('history');

    showHistory();

}

showHistory();

</script>

</body>
</html>

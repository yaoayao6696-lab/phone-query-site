<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机号查询系统</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0958d9;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>手机号查询系统</h2>

    <input type="text" id="phone" placeholder="请输入手机号">

    <button onclick="queryPhone()">查询</button>

    <div id="result"></div>

</div>

<script>

async function queryPhone() {

    const phone = document.getElementById('phone').value;

    if (!phone) {
        alert('请输入手机号');
        return;
    }

    const response = await fetch('https://phone-query-site.onrender.com/query', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ phone })
    });

    const data = await response.json();

    document.getElementById('result').innerHTML = data.message;
}

</script>

</body>
</html>

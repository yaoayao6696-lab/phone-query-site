<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手机号查询系统</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:500px;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:#1677ff;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    background:#f0f2f5;
    padding:20px;
    border-radius:10px;
}

.history-item{
    background:#f5f5f5;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}

</style>

</head>
<body>

<div class="container">

<h2>手机号查询系统</h2>

<input type="text" id="username" placeholder="请输入查询人">

<input type="text" id="phone" placeholder="请输入手机号">

<button onclick="queryPhone()">查询</button>

<div id="result"></div>

<h3>我的查询记录</h3>

<div id="history"></div>

<h3>全站查询记录</h3>

<div id="allRecords"></div>

</div>

<script>

async function queryPhone(){

    const username = document.getElementById('username').value;

    const phone = document.getElementById('phone').value;

    if(!username || !phone){

        alert('请输入姓名和手机号');

        return;

    }

    const response = await fetch('/query',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            username,
            phone
        })

    });

    const data = await response.json();

    document.getElementById('result').innerHTML = `
        <strong>${data.message}</strong>
        <br><br>
        查询人：
        <br>
        ${data.users.join('<br>')}
    `;

    saveHistory(phone);

}

function saveHistory(phone){

    let history = JSON.parse(localStorage.getItem('history')) || [];

    history.unshift({
        phone:phone,
        time:new Date().toLocaleString('zh-CN')
    });

    localStorage.setItem('history',JSON.stringify(history));

    showHistory();

}

function showHistory(){

    let history = JSON.parse(localStorage.getItem('history')) || [];

    let html='';

    history.forEach(item=>{

        html += `
        <div class="history-item">
            手机号：${item.phone}<br>
            时间：${item.time}
        </div>
        `;

    });

    document.getElementById('history').innerHTML = html;

}

showHistory();

async function loadAllRecords(){

    const response = await fetch('/all');

    const data = await response.json();

    let html = '';

    data.forEach(item=>{

        html += `
        <div class="history-item">

            手机号：${item.phone}
            <br>

            查询次数：${item.count}
            <br>

            查询人：
            <br>

            ${item.users.join('、')}

        </div>
        `;

    });

    document.getElementById('allRecords').innerHTML = html;

}

loadAllRecords();

</script>

</body>
</html>
